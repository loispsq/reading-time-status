name: Release Obsidian plugin

# 打一个 x.y.z 的 tag 即触发：CI 构建 → 生成溯源证明(attestation) → 建 Release 挂三件套。
# 由 CI 独家产出发布产物，保证 Release 资产字节 == 被签名的字节（本地 release.mjs 不再建 Release）。
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write        # 建 Release
  id-token: write        # attestation 用 OIDC 身份签名
  attestations: write    # 写入构建溯源证明

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          npm install
          npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release (idempotent)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              main.js manifest.json styles.css
          fi
